<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <header id="tophead">
        <img src="McNeeseLogo.PNG" alt="McNeese Logo" class="logo">
    </header>

    <main class="main">
        <div class="register">
            <form id="register-form">
                <div class="inputGroup">
                    <label for="username">Username</label>
                    <input type="text" id="Username" name="username" required>
                </div>
                
                
                <div class="inputGroup">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="REgister">Login</button>
                <!--for routing to thee register page-->
                <h4 style="margin-top: 0px; font-weight: 99;">Dont have an account? <a href="register.html">Register here.</a></h4>
            <div id="errorbox" style="width: 100%; height: 100px; border: 1px solid red; border-radius: 4px; background-color: rgba(255,0,0,.3); display: none; flex-direction: column; align-items: center; justify-content: center;">
                <h4 style="margin-top: 0px; font-weight: 100;">Incorrect Password!</h4>
            </div>
            </form>
        </div>
    </main>
<script>

    var registtrationForm = document.getElementById("register-form");
registtrationForm.addEventListener("submit", async function(e){
    e.preventDefault();

    const formsData = new FormData(registtrationForm);

    //for registration
    try {
        const response = await fetch("login.php", {
        method: "POST", body: formsData});

        const dataGrabbed = await response.json();

        if(dataGrabbed.status == "success"){
            //for grabingg username from request
            const usernameoaram = encodeURIComponent(dataGrabbed.username);
            window.location.href = "Homepage.html?username=" + usernameoaram;
        } else if (dataGrabbed.status =="failure"){
            const erorM = "server error found"
            console.log(erorM);
            alert("Error in server!: " + erorM)}
        else {
            const errorBox = document.getElementById("errorbox")
            errorBox.style.display = "flex";
            //make console logfor flex
        } 
    } catch (err) {
        //if request cantt be grabbed from backnd
        alert("Server error!! try later.");
        console.error(err);
        console.error(err);
    }/*
    catch (errorCaught){
    let errorTex = document.getElementById("errorbox")
    alert("Err found!!!!")}
    */
});

</script>
</body>
</html>
</body>
</html>
