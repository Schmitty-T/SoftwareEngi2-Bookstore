<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name = "author" content="Seth Dyer">
    <link rel="stylesheet" href="Homepage.css">
    <title>Homepage</title>
</head>

<body>
<header>
    <div id="headerTop">
        <div class="headerLeft"></div>

        <div id="logo">
            <img src="McNeeseLogo.png" alt="Bookstore Logo">
        </div>

        <div id="userPanel">
            <span>Hello, <span id="username"></span></span>
            <button><a href="login.html">Log Out</a></button>
        </div>
    </div>

    <nav id="navBar">
        <ul>
            <li><a href="Homepage.html" class="active">Homepage</a></li>
            <li><a href="Categories.php">Categories</a></li>
            <li><a href="Cart.php">Shopping Cart</a></li>
            <li><a href="OrderHistory.php">Order History</a></li>
        </ul>
    </nav>
</header>

<main>

    <div class="newsSection">

        <h1>Latest News</h1>

        <div class="newsContainer">

            <div class="newsBox">
                <h2>New Arrivals</h2>
                <p>Check out the latest books now available in our store.</p>
            </div>

            <div class="newsBox">
                <h2>Summer Sale</h2>
                <p>Get up to 30% off selected in store items this week!</p>
            </div>

            <div class="newsBox">
                <h2>Store Update</h2>
                <p>We’ve expanded our inventory with new categories.</p>
            </div>

        </div>

    </div>

</main>
<script>
    // Function to get URL parameters
    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    // Get the username from the URL and display it
    const username = getUrlParameter('username');
    if (username) {
        document.getElementById('username').textContent = decodeURIComponent(username);
    } else {
        // Fallback if no username is provided (e.g., direct access to homepage)
        document.getElementById('username').textContent = 'Guest';
    }

    const links = document.querySelectorAll('nav a');
    links.forEach(link => {
        const url = new URL(link.href, window.location.origin);
        if (!url.searchParams.has('username') && username) {
            url.searchParams.set('username', encodeURIComponent(username));
            link.href = url.toString();
        }
    });
</script>
</body>
</html>
