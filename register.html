<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<title>Register</title>
<link rel="stylesheet" href="register.css">
</head>
<body>

<header id="tophead">
    <img src="McNeeseLogo.PNG" alt="McNeese Logo" class="logo">
</header>

<main class="main">
    <div class="register">
    
        <form id="register-form">   
            
            <div class="inputGroup">
                <label for="Username">Username</label>
                <input type="text" id="Username" name="username" required>
            </div>
            
            <div class="inputGroup email">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="inputGroup">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="inputGroup">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
            
            <button type="submit" class="REgister">Register</button>
        </form>
    </div>
</main>

<script>
document.getElementById("register-form").addEventListener("submit", async function(eventForm){
    eventForm.preventDefault();

    //gets and checks the doc info
    const userName = document.getElementById("Username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Passwords don't match.");
        return;
    }

    const formsData = new FormData();
    formsData.append("username", userName);
    formsData.append("email", email);
    formsData.append("password", password);
    formsData.append("confirmPassword", confirmPassword);

    try {
        const response = await fetch("register.php", {
            method: "POST",
            body: formsData
        });

        const data = await response.json();

        if(data.status == "success"){
            const usernameParam = encodeURIComponent(data.username);
            window.location.href = "Homepage.html?username=" + usernameParam;
            document.getElementById("register-form").reset();
        } else {
            alert("Error ocurred: " + data.message);
        }

    } catch (errorFound) {
        alert("Request failed. Username or email already exist");
        console.error(errorFound);
    }
});
</script>

</body>
</html>
