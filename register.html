<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<title>Register</title>
<link rel="stylesheet" href="register.css">
</head>
<body>

<header id="tophead">
    <img src="McNeeseLogo.PNG" alt="McNeese Logo" class="logo">
</header>

<main class="main">
    <div class="register">
    
        <form id="register-form">   
            
            <div class="inputGroup">
                <label for="Username">Username</label>
                <input type="text" id="Username" name="username" required>
            </div>
            
            <div class="inputGroup email">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="inputGroup">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="inputGroup">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
            
            <button type="submit" class="REgister">Register</button>
            <h4 style="margin-top: 0px; font-weight: 100;">Already have an account? <a href="login.html">Login here.</a></h4>
            <!--error box-->
            <div id="errorbox" style="width: 100%; width: 100%; height: 100px; border: 1px solid red; border-radius: 4px; background-color: rgba(255,0,0,.3); display: none; flex-direction: column; align-items: center; justify-content: center;">
                <h4 style="margin-top: 0px; font-weight: 100;">Username or email already exist!!!</h4>
            </div>
        </form>
    </div>
</main>

<script>
document.getElementById("register-form").addEventListener("submit", async function(eventForm){
    eventForm.preventDefault();

    //gets and checks the doc info
    const userName = document.getElementById("Username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Passwords don't match.");
        return;
    }

    const formsData = new FormData();
    //for collect the form data
    formsData.append("username", userName);
    formsData.append("email", email);
    formsData.append("password", password);
    formsData.append("confirmPassword", confirmPassword);

    try {
        const response = await fetch("register.php", {
            method: "POST",
            body: formsData
        });

        const data = await response.json();

        if(data.status == "success"){
            //routes to the homepage and encodse the username
            const usernameParam = encodeURIComponent(data.username);
            window.location.href = "Homepage.html?username=" + usernameParam;
            document.getElementById("register-form").reset();
        } else if (data.status =="failure"){
            const erorM = "server error found"
            console.log(erorM);
            alert("Error in server!: " + erorM)
        }else {
            alert("error ocurred!: " + data.message);
        }

    } catch (errorFound) {
        const errorsbox = document.getElementById("errorbox")
        errorsbox.style.display = "flex";
        console.error(errorFound);
    }
    /*
    catch (errorCaught){
    let errorTex = document.getElementById("errorbox")
    alert("Err found!!!!")}
    */
});
</script>

</body>
</html>
