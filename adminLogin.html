<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <header id="tophead">
        <img src="McNeeseLogo.PNG" alt="McNeese Logo" class="logo">
    </header>

    <main class="main">
        <div class="register">
            <form id="register-form">
                <h2 style="width: 100%; margin-left: 105px">Admin Login</h2>
                <div class="inputGroup">
                    <label for="username">Username</label>
                    <input type="text" id="Username" name="username" required>
                </div>
                
                
                <div class="inputGroup">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="REgister">Login</button>
            </form>
        </div>
    </main>
<script>
    var registtrationForm = document.getElementById("register-form");

registtrationForm.addEventListener("submit", async function(e){
    e.preventDefault();

    const formData = new FormData(registtrationForm);

    try {
        const response = await fetch("adminlogin.php", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if(data.status === "success"){
            const usernameParam = encodeURIComponent(data.username);
            window.location.href = "AdminHomepage.php?username=" + usernameParam;
        } else {
            alert("Login failed!!! " + data.message);
            
        }
    } catch (err) {
        alert("Server error. try later.");
        console.error(err);
    }
});
</script>
</body>
</html>
</body>
</html>
